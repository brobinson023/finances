<!-- Personal Finance Dashboard - single-file web app -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0f12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finances">
<title>Finances</title>
<link id="appleIcon" rel="apple-touch-icon" href="">
<style>
  :root{
    --bg:#0d0f12; --surface:#15181d; --surface2:#1c2026; --border:#282d35;
    --text:#e6e8eb; --muted:#868d98; --green:#34d399; --amber:#f0b429;
    --red:#f2545b; --accent:#5b9dff;
    --radius:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px; -webkit-font-smoothing:antialiased}
  .wrap{max-width:560px; margin:0 auto; padding:max(16px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom))}
  h1{font-size:1.35rem; font-weight:650; margin:4px 0 2px; letter-spacing:-.01em}
  h2{font-size:.78rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); margin:0}
  .sub{color:var(--muted); font-size:.85rem; margin:0 0 18px}
  .num{font-variant-numeric:tabular-nums}
  /* top summary */
  .summary{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:14px 0 22px}
  .sumcard{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 12px}
  .sumcard .lbl{color:var(--muted); font-size:.7rem; text-transform:uppercase; letter-spacing:.06em}
  .sumcard .val{font-size:1.15rem; font-weight:650; margin-top:6px}
  .pos{color:var(--green)} .neg{color:var(--red)}
  /* section header row */
  .shead{display:flex; align-items:center; justify-content:space-between; margin:26px 0 12px}
  .add{background:var(--surface2); color:var(--text); border:1px solid var(--border);
    border-radius:10px; padding:7px 12px; font-size:.8rem; font-weight:600; cursor:pointer}
  .add:active{background:#262b33}
  /* cards / lists */
  .row{background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:14px; margin-bottom:10px; display:flex; align-items:center; gap:12px}
  .row .grow{flex:1; min-width:0}
  .row .name{font-weight:600; font-size:.97rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .row .meta{color:var(--muted); font-size:.8rem; margin-top:3px}
  .row .amt{font-weight:650; font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap}
  .reorder{display:flex; flex-direction:column; gap:1px; flex:none; margin:-4px 0}
  .reorder button{background:none; border:none; color:var(--muted); font-size:.72rem; line-height:1; cursor:pointer; padding:3px 3px}
  .reorder button:active{color:var(--text)}
  .pill{font-size:.68rem; font-weight:700; padding:3px 8px; border-radius:99px; letter-spacing:.02em}
  .pill.red{background:rgba(242,84,91,.15); color:var(--red)}
  .pill.amber{background:rgba(240,180,41,.15); color:var(--amber)}
  .pill.green{background:rgba(52,211,153,.15); color:var(--green)}
  .pill.mut{background:var(--surface2); color:var(--muted)}
  .check{width:26px; height:26px; border-radius:50%; border:1.6px solid var(--border);
    background:none; cursor:pointer; flex:none; display:grid; place-items:center; color:transparent; font-size:.8rem}
  .check.done{background:var(--green); border-color:var(--green); color:#0d0f12}
  /* alerts */
  .alerts{background:linear-gradient(180deg,rgba(242,84,91,.08),rgba(240,180,41,.06));
    border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px}
  .alerts .ahead{font-size:.78rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--amber); margin-bottom:8px}
  .alerts .aitem{display:flex; justify-content:space-between; padding:5px 0; font-size:.9rem}
  .alerts .aitem .w{color:var(--muted)}
  /* progress bars */
  .bar{height:8px; border-radius:99px; background:var(--surface2); overflow:hidden; margin-top:10px}
  .bar > span{display:block; height:100%; background:var(--green); border-radius:99px}
  .prog-meta{display:flex; justify-content:space-between; color:var(--muted); font-size:.78rem; margin-top:7px}
  /* debt filter tabs */
  .tabs{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; -webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none; background:var(--surface); border:1px solid var(--border); color:var(--muted);
    border-radius:99px; padding:7px 14px; font-size:.8rem; font-weight:600; cursor:pointer; white-space:nowrap}
  .tab.active{background:var(--text); color:var(--bg); border-color:var(--text)}
  /* started vs now progress panel */
  .ppanel{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 16px; margin-bottom:14px}
  .ppanel .big{font-size:1.5rem; font-weight:700; letter-spacing:-.01em}
  .ppanel .big .pct{color:var(--green); font-weight:650; font-size:1.05rem; margin-left:6px}
  .ppanel .bigsub{color:var(--muted); font-size:.84rem; margin-top:3px}
  .startbar{height:13px; border-radius:99px; background:var(--surface2); overflow:hidden; margin:16px 0 9px}
  .startbar > span{display:block; height:100%; background:linear-gradient(90deg,#2dd4a7,var(--green)); border-radius:99px; transition:width .5s ease}
  .ends{display:flex; justify-content:space-between; font-size:.78rem; color:var(--muted)}
  .ends b{color:var(--text); font-weight:600}
  .minline{margin:-4px 2px 14px; font-size:.8rem; color:var(--muted)}
  .minline b{color:var(--text)}
  .tprog{margin-top:6px}
  .tp{margin-bottom:14px}
  .tprow{display:flex; justify-content:space-between; font-size:.83rem; margin-bottom:6px}
  .tprow .tn{font-weight:600}
  .tprow .tv{color:var(--muted)}
  .grouphead{display:flex; justify-content:space-between; align-items:center; margin:18px 2px 8px;
    font-size:.72rem; font-weight:700; letter-spacing:.05em; color:var(--muted); text-transform:uppercase}
  .grouphead .num{color:var(--text)}
  /* calendar */
  .calnav{display:flex; gap:6px}
  .calnav button{background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:5px 11px; font-size:.85rem; cursor:pointer; line-height:1}
  .calwrap{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 12px}
  .cgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px}
  .cdow{text-align:center; font-size:.62rem; color:var(--muted); font-weight:700; padding-bottom:6px; letter-spacing:.03em}
  .cell{aspect-ratio:1/1; border-radius:9px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; font-size:.82rem; cursor:pointer}
  .cell.empty{cursor:default}
  .cell .dn{font-variant-numeric:tabular-nums; color:var(--text); width:24px; height:24px; display:grid; place-items:center}
  .cell.today .dn{background:var(--green); color:#0d0f12; border-radius:50%; font-weight:700}
  .cell.sel{background:var(--surface2)}
  .cdot{width:5px; height:5px; border-radius:50%; background:var(--accent)}
  .cdot.red{background:var(--red)} .cdot.amber{background:var(--amber)} .cdot.green{background:var(--green)}
  /* spending chart */
  .spend .crow{display:flex; align-items:center; gap:10px; margin-bottom:11px; font-size:.85rem}
  .spend .clabel{width:96px; flex:none; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .spend .ctrack{flex:1; height:10px; background:var(--surface2); border-radius:99px; overflow:hidden}
  .spend .ctrack > span{display:block; height:100%; background:var(--accent); border-radius:99px}
  .spend .cval{width:74px; text-align:right; color:var(--muted); font-variant-numeric:tabular-nums; flex:none}
  /* empty */
  .empty{color:var(--muted); font-size:.88rem; text-align:center; padding:22px 10px; border:1px dashed var(--border); border-radius:14px}
  .empty a{color:var(--accent); cursor:pointer; text-decoration:none}
  /* footer tools */
  .tools{display:flex; gap:8px; margin-top:34px; flex-wrap:wrap; justify-content:center}
  .tools button{background:none; border:1px solid var(--border); color:var(--muted);
    border-radius:9px; padding:7px 12px; font-size:.76rem; cursor:pointer}
  .note{font-size:.74rem; color:var(--amber); text-align:center; margin-top:16px; display:none}
  /* modal */
  .ov{position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(3px);
    display:none; align-items:flex-end; justify-content:center; z-index:50}
  .ov.show{display:flex}
  .modal{background:var(--surface); border:1px solid var(--border); border-radius:20px 20px 0 0;
    width:100%; max-width:560px; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); animation:up .22s ease; max-height:92vh; overflow-y:auto}
  @media(min-width:600px){.ov{align-items:center} .modal{border-radius:20px}}
  @keyframes up{from{transform:translateY(30px); opacity:.5}to{transform:none; opacity:1}}
  .modal h3{margin:0 0 16px; font-size:1.05rem}
  .field{margin-bottom:13px}
  .field label{display:block; font-size:.76rem; color:var(--muted); margin-bottom:6px}
  .field input,.field select{width:100%; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); border-radius:10px; padding:11px 12px; font-size:1rem; font-family:inherit}
  .field input:focus,.field select:focus{outline:none; border-color:var(--accent)}
  .mrow{display:flex; gap:10px}
  .mrow .field{flex:1}
  .chk{display:flex; align-items:center; gap:9px; font-size:.9rem; color:var(--text); cursor:pointer}
  .chk input{width:auto}
  .mbtns{display:flex; gap:10px; margin-top:18px}
  .btn{flex:1; border:none; border-radius:11px; padding:13px; font-size:.95rem; font-weight:650; cursor:pointer}
  .btn.primary{background:var(--green); color:#0d0f12}
  .btn.ghost{background:var(--surface2); color:var(--text); border:1px solid var(--border)}
  .btn.del{background:rgba(242,84,91,.12); color:var(--red); flex:0 0 auto; padding:13px 16px}
  textarea{width:100%; min-height:130px; background:var(--surface2); border:1px solid var(--border);
    color:var(--text); border-radius:10px; padding:11px; font-family:ui-monospace,Menlo,monospace; font-size:.82rem}
</style>

<div class="wrap">
  <h1>Finances</h1>
  <p class="sub" id="today"></p>

  <div class="summary">
    <div class="sumcard"><div class="lbl">Balances</div><div class="val num pos" id="sumBal">$0</div></div>
    <div class="sumcard"><div class="lbl">Debt</div><div class="val num neg" id="sumDebt">$0</div></div>
    <div class="sumcard"><div class="lbl">Net</div><div class="val num" id="sumNet">$0</div></div>
  </div>

  <div id="alertWrap"></div>

  <div class="shead"><h2>Accounts</h2><button class="add" onclick="openModal('account')">+ Add</button></div>
  <div id="accounts"></div>

  <div class="shead"><h2>This Month's Bills</h2><button class="add" onclick="openModal('bill')">+ Add</button></div>
  <div id="bills"></div>

  <div class="shead"><h2 id="calTitle">This Month</h2>
    <div class="calnav"><button onclick="calStep(-1)">‹</button><button onclick="calToday()">Today</button><button onclick="calStep(1)">›</button></div>
  </div>
  <div id="calendar"></div>
  <div id="calDetail"></div>

  <div class="shead"><h2>Debt Payoff</h2><button class="add" onclick="openModal('debt')">+ Add</button></div>
  <div id="debtTabs" class="tabs"></div>
  <div id="debtProgress"></div>
  <div id="debts"></div>

  <div class="shead"><h2>Monthly Spending</h2></div>
  <div id="spend" class="spend"></div>

  <div class="tools">
    <button onclick="exportData()">Export data</button>
    <button onclick="openImport()">Import data</button>
    <button onclick="loadSample()">Load example</button>
    <button onclick="wipe()">Clear all</button>
  </div>
  <p class="note" id="note">Preview mode — changes won't be saved here. Once you host this file, your data saves automatically on your phone.</p>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<script>
/* ---------- storage with safe fallback (artifact preview can't use localStorage) ---------- */
const KEY='finance_dashboard_v1'; let mem=null, ok=true;
function load(){ try{const r=localStorage.getItem(KEY); return r?JSON.parse(r):blank();}catch(e){ok=false; return mem||blank();} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){ok=false; mem=S;} if(!ok)document.getElementById('note').style.display='block'; }
function blank(){return {accounts:[],bills:[],debts:[]};}
let S=load();

const dTypes=['Credit Cards','Loans','BNPL','Student Loans','Other'];
let debtFilter='All';

/* ---------- helpers ---------- */
const $=id=>document.getElementById(id);
const uid=()=>Math.random().toString(36).slice(2,9);
const money=n=>{const v=Math.round(n); return (v<0?'-$':'$')+Math.abs(v).toLocaleString();}
const money2=n=>(n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString();
function todayMid(){const d=new Date(); d.setHours(0,0,0,0); return d;}
function daysUntil(iso){const d=new Date(iso+'T00:00:00'); return Math.round((d-todayMid())/864e5);}
function fmtDate(iso){const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});}
function dueLabel(n){ if(n<0)return n===-1?'1 day overdue':(-n)+' days overdue'; if(n===0)return'Due today'; if(n===1)return'Due tomorrow'; return'Due in '+n+' days';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function emptyMsg(t,type){return `<div class="empty">${t} <a onclick="openModal('${type}')">Add one</a></div>`;}
function fmtApr(a){const n=+a; return (n%1===0?n.toString():n.toFixed(2))+'% APR';}

/* ---------- render ---------- */
function render(){
  $('today').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});

  const bal=S.accounts.reduce((s,a)=>s+(+a.balance||0),0);
  const debt=S.debts.reduce((s,d)=>s+(+d.current||0),0);
  const net=bal-debt;
  $('sumBal').textContent=money(bal);
  $('sumDebt').textContent=money(debt);
  const ne=$('sumNet'); ne.textContent=money(net); ne.className='val num '+(net>=0?'pos':'neg');

  /* alerts: any unpaid bill due within 7 days or overdue (any month) */
  const flagged=S.bills.filter(b=>!b.paid).map(b=>({...b,d:daysUntil(b.due)}))
    .filter(b=>b.d<=7).sort((a,b)=>a.d-b.d);
  $('alertWrap').innerHTML = flagged.length ? '<div class="alerts"><div class="ahead">⚠ Needs attention</div>'+
      flagged.map(b=>`<div class="aitem"><span>${esc(b.name)}</span><span class="w">${dueLabel(b.d)} · ${money2(+b.amount)}</span></div>`).join('')+'</div>' : '';

  /* accounts (reorderable) */
  $('accounts').innerHTML = S.accounts.length ? S.accounts.map((a,i)=>`
    <div class="row" onclick="openModal('account','${a.id}')">
      <div class="reorder">
        <button onclick="event.stopPropagation();moveAccount('${a.id}',-1)" ${i===0?'style="opacity:.2" disabled':''}>▲</button>
        <button onclick="event.stopPropagation();moveAccount('${a.id}',1)" ${i===S.accounts.length-1?'style="opacity:.2" disabled':''}>▼</button>
      </div>
      <div class="grow"><div class="name">${esc(a.name)}</div><div class="meta">Current balance</div></div>
      <div class="amt ${(+a.balance)>=0?'pos':'neg'}">${money2(+a.balance)}</div>
    </div>`).join('') : emptyMsg('No accounts yet.','account');

  /* bills — current calendar month only */
  const now0=new Date(), cy=now0.getFullYear(), cm=now0.getMonth();
  const monthBills=S.bills.filter(b=>{ if(!b.due)return false; const d=new Date(b.due+'T00:00:00'); return d.getFullYear()===cy && d.getMonth()===cm; });
  const bills=[...monthBills].sort((a,b)=> (a.paid-b.paid) || (new Date(a.due)-new Date(b.due)));
  $('bills').innerHTML = bills.length ? bills.map(b=>{
    const n=daysUntil(b.due); let cls='mut',txt=fmtDate(b.due);
    if(b.paid){cls='green';txt='Paid';}
    else if(n<0){cls='red';}
    else if(n<=7){cls='amber';}
    return `<div class="row">
      <button class="check ${b.paid?'done':''}" onclick="togglePaid('${b.id}')">✓</button>
      <div class="grow" onclick="openModal('bill','${b.id}')">
        <div class="name">${esc(b.name)}</div>
        <div class="meta">${b.paid?'Paid this cycle':dueLabel(n)}${b.recurring?' · monthly':''}</div>
      </div>
      <div style="text-align:right">
        <div class="amt">${money2(+b.amount)}</div>
        <span class="pill ${cls}" style="margin-top:4px;display:inline-block">${txt}</span>
      </div>
    </div>`;
  }).join('') : emptyMsg('No bills due this month.','bill');

  renderCalendar();
  renderDebts();

  /* spending */
  const cats={};
  S.bills.forEach(b=>{const c=b.category||'Other'; cats[c]=(cats[c]||0)+(+b.amount||0);});
  const entries=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const max=entries.length?Math.max(...entries.map(e=>e[1])):0;
  $('spend').innerHTML = entries.length ? entries.map(([c,v])=>`
    <div class="crow"><div class="clabel">${esc(c)}</div>
      <div class="ctrack"><span style="width:${max?Math.round(v/max*100):0}%"></span></div>
      <div class="cval">${money2(v)}</div></div>`).join('')
    : '<div class="empty">Spending by category appears here once you add bills.</div>';

  save();
}

/* ---------- accounts reorder ---------- */
function moveAccount(id,dir){
  const i=S.accounts.findIndex(a=>a.id===id); if(i<0)return;
  const j=i+dir; if(j<0||j>=S.accounts.length)return;
  const [it]=S.accounts.splice(i,1); S.accounts.splice(j,0,it); render();
}

/* ---------- debt section ---------- */
function sumOf(list,key){return list.reduce((s,d)=>s+(+d[key]||0),0);}
function pctPaid(orig,cur){const paid=Math.max(0,orig-cur); return orig>0?Math.round(paid/orig*100):0;}

function progressPanel(label,orig,cur){
  const paid=Math.max(0,orig-cur), pct=pctPaid(orig,cur);
  return `<div class="ppanel">
    <div class="big num">${money2(paid)}<span class="pct">paid off</span></div>
    <div class="bigsub">${esc(label)} · ${pct}% of the way to zero</div>
    <div class="startbar"><span style="width:${pct}%"></span></div>
    <div class="ends"><span>Started <b>${money2(orig)}</b></span><span>Now <b>${money2(cur)}</b></span></div>
  </div>`;
}
function miniProg(tp,orig,cur){
  const pct=pctPaid(orig,cur);
  return `<div class="tp">
    <div class="tprow"><span class="tn">${tp}</span><span class="tv">${money2(cur)} left · ${pct}% paid</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
  </div>`;
}
function debtRow(d){
  const orig=+d.original||0, cur=+d.current||0, pct=pctPaid(orig,cur), paid=Math.max(0,orig-cur);
  const bits=[];
  if(d.apr!=null && d.apr!=='') bits.push(fmtApr(d.apr));
  if(d.minPayment!=null && d.minPayment!=='') bits.push(money2(+d.minPayment)+'/mo min');
  const meta=bits.length?`<div class="meta" style="margin-top:4px">${bits.join(' · ')}</div>`:'';
  return `<div class="row" style="flex-direction:column;align-items:stretch">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px" onclick="openModal('debt','${d.id}')">
      <div class="grow"><div class="name">${esc(d.name)}</div>${meta}</div>
      <div class="amt neg">${money2(cur)}</div></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <div class="prog-meta"><span>${pct}% paid off</span><span>${money2(paid)} of ${money2(orig)}</span></div>
  </div>`;
}
function setDebtFilter(t){debtFilter=t; renderDebts();}

function renderDebts(){
  if(!S.debts.length){ $('debtTabs').innerHTML=''; $('debtProgress').innerHTML=''; $('debts').innerHTML=emptyMsg('No debts tracked.','debt'); return; }
  const present=dTypes.filter(tp=>S.debts.some(d=>(d.type||'Other')===tp));
  const tabs=['All',...present];
  if(!tabs.includes(debtFilter)) debtFilter='All';
  $('debtTabs').innerHTML=tabs.map(t=>`<button class="tab ${debtFilter===t?'active':''}" onclick="setDebtFilter('${t}')">${t}</button>`).join('');

  if(debtFilter==='All'){
    let p=progressPanel('Total debt', sumOf(S.debts,'original'), sumOf(S.debts,'current'));
    const totalMin=sumOf(S.debts,'minPayment');
    if(totalMin>0) p+=`<div class="minline">Minimum payments <b>${money2(totalMin)}/mo</b> across all debts</div>`;
    p+='<div class="tprog">'+present.map(tp=>{
      const g=S.debts.filter(d=>(d.type||'Other')===tp);
      return miniProg(tp, sumOf(g,'original'), sumOf(g,'current'));
    }).join('')+'</div>';
    $('debtProgress').innerHTML=p;
  } else {
    const g=S.debts.filter(d=>(d.type||'Other')===debtFilter);
    let p=progressPanel(debtFilter, sumOf(g,'original'), sumOf(g,'current'));
    const tm=sumOf(g,'minPayment');
    if(tm>0) p+=`<div class="minline">Minimum payments <b>${money2(tm)}/mo</b></div>`;
    $('debtProgress').innerHTML=p;
  }

  let html='';
  const groups = debtFilter==='All' ? present : [debtFilter];
  groups.forEach(tp=>{
    const grp=S.debts.filter(d=>(d.type||'Other')===tp); if(!grp.length)return;
    if(debtFilter==='All') html+=`<div class="grouphead"><span>${tp}</span><span class="num">${money2(sumOf(grp,'current'))}</span></div>`;
    html+=grp.map(debtRow).join('');
  });
  $('debts').innerHTML=html;
}

/* ---------- calendar (re-anchors to today's real date every time the app opens) ---------- */
let calY, calM, calSel;
(function(){const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); calSel=n.getDate();})();
function calToday(){const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); calSel=n.getDate(); renderCalendar();}
function calStep(dir){ calM+=dir; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} calSel=1; renderCalendar(); }
function selDay(day){ calSel=day; renderCalendar(); }
function billsForMonth(year,month){
  const map={}; const last=new Date(year,month+1,0).getDate();
  S.bills.forEach(b=>{ if(!b.due)return; const d=new Date(b.due+'T00:00:00');
    if(b.recurring){ const day=Math.min(d.getDate(),last); (map[day]=map[day]||[]).push(b); }
    else if(d.getFullYear()===year && d.getMonth()===month){ (map[d.getDate()]=map[d.getDate()]||[]).push(b); }
  });
  return map;
}
function renderCalendar(){
  const now=new Date(), ty=now.getFullYear(), tm=now.getMonth(), td=now.getDate();
  $('calTitle').textContent=new Date(calY,calM,1).toLocaleDateString(undefined,{month:'long',year:'numeric'});
  const first=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const map=billsForMonth(calY,calM);
  let g=['S','M','T','W','T','F','S'].map(d=>`<div class="cdow">${d}</div>`).join('');
  for(let i=0;i<first;i++) g+='<div class="cell empty"></div>';
  for(let day=1; day<=days; day++){
    const isToday = calY===ty && calM===tm && day===td;
    const bs=map[day]||[]; let dot='';
    if(bs.length){
      const diff=Math.round((new Date(calY,calM,day)-new Date(ty,tm,td))/864e5);
      const anyUnpaid=bs.some(b=>!b.paid);
      const cls = !anyUnpaid?'green' : diff<0?'red' : diff<=7?'amber' : '';
      dot=`<div class="cdot ${cls}"></div>`;
    }
    g+=`<div class="cell ${isToday?'today':''} ${day===calSel?'sel':''}" onclick="selDay(${day})"><span class="dn">${day}</span>${dot}</div>`;
  }
  $('calendar').innerHTML=`<div class="calwrap"><div class="cgrid">${g}</div></div>`;
  renderCalDetail();
}
function renderCalDetail(){
  const bs=billsForMonth(calY,calM)[calSel]||[];
  const label=new Date(calY,calM,calSel).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  if(!bs.length){ $('calDetail').innerHTML=`<div class="empty" style="margin-top:10px">No bills on ${label}.</div>`; return; }
  const total=bs.reduce((s,b)=>s+(+b.amount||0),0);
  $('calDetail').innerHTML=`<div style="margin-top:12px"><div class="grouphead"><span>${label}</span><span class="num">${money2(total)}</span></div>`+
    bs.map(b=>`<div class="row"><div class="grow"><div class="name">${esc(b.name)}</div><div class="meta">${esc(b.category||'Other')}${b.recurring?' · monthly':''}${b.paid?' · paid':''}</div></div><div class="amt">${money2(+b.amount)}</div></div>`).join('')+`</div>`;
}

/* ---------- actions ---------- */
function togglePaid(id){
  const b=S.bills.find(x=>x.id===id); if(!b)return;
  if(!b.paid && b.recurring){
    const d=new Date(b.due+'T00:00:00'); d.setMonth(d.getMonth()+1);
    b.due=d.toISOString().slice(0,10); b.paid=false;
  } else { b.paid=!b.paid; }
  render();
}

/* ---------- modal ---------- */
let editing=null;
function openModal(type,id){
  editing={type,id};
  const item = id ? S[type+'s'].find(x=>x.id===id) : null;
  const today=new Date().toISOString().slice(0,10);
  let f='';
  if(type==='account'){
    f=`<div class="field"><label>Account name</label><input id="f_name" value="${item?esc(item.name):''}" placeholder="Checking, Savings…"></div>
       <div class="field"><label>Current balance ($)</label><input id="f_balance" type="number" inputmode="decimal" value="${item?item.balance:''}" placeholder="0"></div>`;
  } else if(type==='bill'){
    const cats=['Housing','Utilities','Insurance','Subscriptions','Car','Phone','Debt','Other'];
    f=`<div class="field"><label>Bill name</label><input id="f_name" value="${item?esc(item.name):''}" placeholder="Rent, Electric…"></div>
       <div class="mrow"><div class="field"><label>Amount ($)</label><input id="f_amount" type="number" inputmode="decimal" value="${item?item.amount:''}" placeholder="0"></div>
       <div class="field"><label>Due date</label><input id="f_due" type="date" value="${item?item.due:today}"></div></div>
       <div class="field"><label>Category</label><select id="f_category">${cats.map(c=>`<option ${item&&item.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
       <label class="chk"><input type="checkbox" id="f_recurring" ${(item?item.recurring:true)?'checked':''}> Repeats monthly</label>`;
  } else if(type==='debt'){
    f=`<div class="field"><label>Debt name</label><input id="f_name" value="${item?esc(item.name):''}" placeholder="Visa, Car loan…"></div>
       <div class="field"><label>Type</label><select id="f_type">${dTypes.map(t=>`<option ${item&&item.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
       <div class="mrow"><div class="field"><label>Current balance ($)</label><input id="f_current" type="number" inputmode="decimal" value="${item?item.current:''}" placeholder="0"></div>
       <div class="field"><label>Starting balance ($)</label><input id="f_original" type="number" inputmode="decimal" value="${item?item.original:''}" placeholder="0"></div></div>
       <div class="mrow"><div class="field"><label>APR (%)</label><input id="f_apr" type="number" inputmode="decimal" value="${item&&item.apr!=null?item.apr:''}" placeholder="optional"></div>
       <div class="field"><label>Min. payment ($)</label><input id="f_min" type="number" inputmode="decimal" value="${item&&item.minPayment!=null?item.minPayment:''}" placeholder="optional"></div></div>
       <div style="font-size:.74rem;color:var(--muted)">Starting balance is what you originally owed — it's what the payoff progress measures against.</div>`;
  }
  $('modal').innerHTML=`<h3>${item?'Edit':'Add'} ${type}</h3>${f}
    <div class="mbtns">
      ${item?`<button class="btn del" onclick="del()">Delete</button>`:''}
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveItem()">Save</button>
    </div>`;
  $('ov').classList.add('show');
}
function closeModal(){$('ov').classList.remove('show'); editing=null;}
$('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal();});

function saveItem(){
  const {type,id}=editing; const list=S[type+'s'];
  const v=k=>$('f_'+k)?$('f_'+k).value:'';
  let obj;
  if(type==='account') obj={name:v('name')||'Account', balance:+v('balance')||0};
  else if(type==='bill') obj={name:v('name')||'Bill', amount:+v('amount')||0, due:v('due'), category:v('category'), recurring:$('f_recurring').checked, paid:id?(S.bills.find(x=>x.id===id).paid):false};
  else obj={name:v('name')||'Debt', type:v('type')||'Other', current:+v('current')||0, original:+v('original')||+v('current')||0,
    apr:v('apr')!==''?+v('apr'):null, minPayment:v('min')!==''?+v('min'):null};
  if(id){Object.assign(list.find(x=>x.id===id),obj);} else {obj.id=uid(); list.push(obj);}
  closeModal(); render();
}
function del(){const {type,id}=editing; S[type+'s']=S[type+'s'].filter(x=>x.id!==id); closeModal(); render();}

/* ---------- data tools ---------- */
function exportData(){
  editing={type:'export'};
  const json=JSON.stringify(S,null,2);
  $('modal').innerHTML=`<h3>Export / backup</h3>
    <div class="field"><label>Your data — copy this and paste it somewhere safe</label><textarea id="f_export" readonly>${esc(json)}</textarea></div>
    <div class="mbtns">
      <button class="btn ghost" onclick="closeModal()">Close</button>
      <button class="btn ghost" onclick="downloadExport()">Download</button>
      <button class="btn primary" onclick="copyExport(this)">Copy</button>
    </div>`;
  $('ov').classList.add('show');
  setTimeout(()=>{const t=$('f_export'); if(t){t.focus(); t.select();}},60);
}
function copyExport(btn){
  const t=$('f_export'); if(!t)return;
  t.focus(); t.select(); t.setSelectionRange(0,999999);
  const done=()=>{const o=btn.textContent; btn.textContent='Copied ✓'; setTimeout(()=>btn.textContent=o,1500);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t.value).then(done).catch(()=>{try{document.execCommand('copy');done();}catch(e){}});
  } else { try{document.execCommand('copy'); done();}catch(e){} }
}
function downloadExport(){
  try{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='finances-backup.json'; document.body.appendChild(a); a.click();
    setTimeout(()=>{a.remove(); URL.revokeObjectURL(a.href);},100);
  }catch(e){ alert('Download is blocked in this preview — use Copy instead. It works once the app is hosted.'); }
}
function openImport(){
  editing={type:'import'};
  $('modal').innerHTML=`<h3>Import data</h3>
    <div class="field"><label>Paste JSON (accounts, bills, debts)</label><textarea id="f_json" placeholder='{"accounts":[],"bills":[],"debts":[]}'></textarea></div>
    <div class="mbtns"><button class="btn ghost" onclick="closeModal()">Cancel</button>
    <button class="btn primary" onclick="doImport()">Import</button></div>`;
  $('ov').classList.add('show');
}
function doImport(){
  try{
    const d=JSON.parse($('f_json').value);
    S={accounts:(d.accounts||[]).map(normalize), bills:(d.bills||[]).map(normalize), debts:(d.debts||[]).map(normalize)};
    closeModal(); render();
  }catch(e){alert('Couldn\'t read that — make sure it\'s valid JSON.');}
}
function normalize(o){if(!o.id)o.id=uid(); return o;}
function wipe(){ if(confirm('Clear all data? This cannot be undone.')){S=blank(); render();} }
